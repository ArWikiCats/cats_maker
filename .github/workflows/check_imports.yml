name: Check forbidden imports

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    check-imports:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Run import check
              run: python scripts/check_imports.py
